<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avance | Frequencia da Sala</title>
  <link rel="icon" href="/logo.jpeg" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div class="brand-block">
        <div class="logo">
          <img src="/logo.jpeg" alt="Logo Avance" class="logo-image" />
          <div>
            <span class="logo-name">Avance</span>
            <small class="logo-tagline">Controle diario de frequencia e contato com a familia</small>
          </div>
        </div>
        <h1 id="sala-titulo">Controle de Frequencia</h1>
      </div>
      <div class="date-field">
        <label for="data-aula">Data da aula</label>
        <input id="data-aula" type="date" />
      </div>
    </header>

    <div id="alert-box" class="alert"></div>

    <section class="chamada-bar card">
      <div class="chamada-count presentes-count">
        <span class="count-num" id="count-presentes">—</span>
        <span class="count-label">Presentes</span>
      </div>
      <div class="chamada-progress-col">
        <div class="chamada-progress-wrap">
          <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
        </div>
        <span class="chamada-total" id="count-total">Carregando...</span>
      </div>
      <div class="chamada-count faltas-count">
        <span class="count-num" id="count-faltas">—</span>
        <span class="count-label">Faltas</span>
      </div>
    </section>

    <section id="alunos-list" class="alunos-list"></section>

    <section class="card responsavel-panel">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Relatório mensal</p>
          <h2>Resumo da frequência da sala por mês</h2>
        </div>
      </div>
      <div class="form-grid compact-grid">
        <div class="form-group">
          <label for="mes-pesquisa">Mês do relatório</label>
          <input id="mes-pesquisa" type="month" />
        </div>
      </div>
      <div id="mensal-summary" class="mensal-summary"></div>
      <div id="mensal-alunos" class="mensal-matrix"></div>
    </section>

    <section id="aluno-detalhe-panel" class="card responsavel-panel hidden">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Detalhes do aluno</p>
          <h2>Frequência individual mensal</h2>
        </div>
      </div>
      <div id="aluno-detalhe-summary" class="mensal-summary"></div>
      <div id="aluno-detalhe-list" class="mensal-matrix"></div>
    </section>

  </main>

  <div class="fab-bar">
    <button id="voltar-btn" class="fab-btn fab-btn-back" aria-label="Voltar ao painel">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
      <span>Voltar</span>
    </button>
    <button id="salvar-btn" class="fab-btn fab-btn-save" aria-label="Salvar frequência do dia">
      <svg id="salvar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span id="salvar-label">Salvar frequência</span>
    </button>
  </div>

  <script type="module" src="/assets/js/sala.js"></script>
</body>
</html>
